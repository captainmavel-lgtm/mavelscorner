backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "src/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Subtitle"
        name: "subtitle"
        widget: "string"
        required: false
        hint: "Optional — a short italic line shown below the title"

      - label: "Publication Date"
        name: "date"
        widget: "date"

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Faith and Discipleship"
          - "Christian Living and Lifestyle"

      - label: "Scripture Reference"
        name: "scripture"
        widget: "string"
        hint: "e.g. Jeremiah 29:11"

      - label: "Scripture Text"
        name: "scripture_text"
        widget: "string"
        hint: "The verse text shown as a preview — e.g. For I know the plans I have for you"

      - label: "Featured Image"
        name: "featured_image"
        widget: "image"
        required: false

      - label: "Post Excerpt"
        name: "excerpt"
        widget: "string"
        pattern: ['.{0,200}', "Keep to 200 characters or fewer"]
        hint: "A short summary shown on the blog listing page (max 200 characters)"

      - label: "Post Body"
        name: "body"
        widget: "markdown"

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        default: ["post"]
        hint: "Add tags separated by pressing Enter — e.g. faith, grace, prayer"

  - name: "events"
    label: "Events"
    folder: "src/_events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Event Date"
        name: "event_date"
        widget: "date"
        hint: "The day the event starts"

      - label: "End Date"
        name: "end_date"
        widget: "date"
        required: false
        hint: "Only needed for multi-day events or conferences"

      - label: "Start Time"
        name: "start_time"
        widget: "string"
        hint: "e.g. 6:00 PM"

      - label: "End Time"
        name: "end_time"
        widget: "string"
        required: false
        hint: "e.g. 8:00 PM"

      - label: "Location"
        name: "location"
        widget: "string"
        required: false
        hint: "Physical address, if applicable"

      - label: "Online/Virtual Link"
        name: "virtual_link"
        widget: "string"
        required: false
        hint: "Zoom, YouTube, or livestream link, if applicable"

      - label: "Event Type"
        name: "event_type"
        widget: "select"
        options:
          - "Worship Service"
          - "Conference"
          - "Outreach"
          - "Bible Study"
          - "Fundraiser"
          - "Other"

      - label: "Description"
        name: "body"
        widget: "markdown"

      - label: "Featured Image"
        name: "featured_image"
        widget: "image"
        required: false

      - label: "Registration/RSVP Link"
        name: "registration_link"
        widget: "string"
        required: false

      - label: "Cost Type"
        name: "cost_type"
        widget: "select"
        options:
          - "Free"
          - "Paid"
        default: "Free"

      - label: "Cost Amount"
        name: "cost_amount"
        widget: "string"
        required: false
        hint: "Only fill in if Cost Type is Paid"

      - label: "Contact Info"
        name: "contact_info"
        widget: "string"
        required: false
        hint: "Email or phone number for inquiries"

      - label: "Featured Event"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Turn on to highlight this event at the top of the Events list"

  - name: "ebooks"
    label: "E-books"
    folder: "src/_ebooks"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Author"
        name: "author"
        widget: "string"

      - label: "Cover Image"
        name: "cover_image"
        widget: "image"

      - label: "Description"
        name: "body"
        widget: "markdown"
        hint: "Summary of the e-book"

      - label: "E-book File (PDF)"
        name: "ebook_file"
        widget: "file"
        hint: "Upload the PDF file for this e-book"

      - label: "Publish Date"
        name: "date"
        widget: "date"

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Devotional"
          - "Theology"
          - "Testimony"
          - "Christian Living"
          - "Other"

      - label: "Price Type"
        name: "price_type"
        widget: "select"
        options:
          - "Free"
          - "Paid"
        default: "Free"

      - label: "Price Amount"
        name: "price_amount"
        widget: "string"
        required: false
        hint: "Only fill in if Price Type is Paid"

      - label: "Page Count"
        name: "page_count"
        widget: "number"
        required: false

      - label: "Featured E-book"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Turn on to highlight this e-book at the top of the E-books list"

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        hint: "Add tags separated by pressing Enter — e.g. grief, healing, marriage"

  - name: "quotes"
    label: "Christian Quotes"
    folder: "src/_quotes"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{fields.author}}"
    identifier_field: "author"
    fields:
      - label: "Quote Text"
        name: "quote_text"
        widget: "text"
        hint: "The full quote, exactly as it should appear"

      - label: "Author / Source"
        name: "author"
        widget: "string"
        hint: "e.g. C.S. Lewis, or 'Unknown' if not known"

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Faith"
          - "Hope"
          - "Second Chances"
          - "Encouragement"
          - "Perseverance"
          - "Other"
        required: false

      - label: "Date Added"
        name: "date"
        widget: "date"

      - label: "Featured Quote"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Turn on to highlight this quote at the top of the list, or use it as Quote of the Day"
